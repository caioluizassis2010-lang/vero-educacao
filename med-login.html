<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vofor Medicina — Entrar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060912;--bg2:#0d1425;--bg3:#131d35;--bg4:#1a2540;
  --blue:#2563eb;--blue2:#3b82f6;--blue3:#1d4ed8;
  --cyan:#06b6d4;--cyan2:#22d3ee;
  --text:#f0f4ff;--muted:#8896b3;--muted2:rgba(136,150,179,0.25);
  --border:rgba(59,130,246,0.15);--border2:rgba(59,130,246,0.3);
  --green:#10b981;--red:#ef4444;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;background-image:radial-gradient(ellipse 80% 60% at 20% 20%,rgba(37,99,235,0.08) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(6,182,212,0.05) 0%,transparent 60%)}
a{text-decoration:none;color:inherit}
nav{padding:20px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(6,9,18,0.8);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100}
.brand{display:inline-flex;align-items:center;gap:14px}
.brand-icon{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--blue3),var(--blue));display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 20px rgba(37,99,235,0.3)}
.brand-name{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600;color:var(--text);letter-spacing:.08em}
.brand-name span{display:block;font-size:.55rem;letter-spacing:.22em;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:400;text-transform:uppercase;margin-top:1px}
.back-link{font-size:.8rem;color:var(--muted);transition:color .2s}
.back-link:hover{color:var(--text)}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:44px 40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.4);position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(59,130,246,0.5),transparent)}
.card-eyebrow{font-size:.7rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--cyan);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.card-eyebrow::before{content:'';width:20px;height:1px;background:var(--cyan);opacity:.5}
.card-title{font-family:'Cormorant Garamond',serif;font-size:2.1rem;font-weight:700;line-height:1.05;margin-bottom:6px}
.card-title em{font-style:italic;color:var(--blue2)}
.card-sub{font-size:.87rem;color:var(--muted);margin-bottom:32px;font-weight:300;line-height:1.7}
.field{margin-bottom:18px}
.field label{display:block;font-size:.72rem;font-weight:600;color:var(--muted);letter-spacing:.08em;margin-bottom:7px;text-transform:uppercase}
.field input{width:100%;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:9px;padding:12px 15px;font-size:.9rem;font-family:'DM Sans',sans-serif;outline:none;transition:all .2s;color-scheme:dark}
.field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,0.12)}
.field input::placeholder{color:var(--muted2)}
.forgot{text-align:right;margin-top:-10px;margin-bottom:18px}
.forgot a{font-size:.78rem;color:var(--muted);transition:color .15s}
.forgot a:hover{color:var(--blue2)}
.btn-submit{width:100%;padding:13px;background:linear-gradient(135deg,var(--blue3),var(--blue));color:#fff;border:none;border-radius:9px;font-size:.92rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;letter-spacing:.01em;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 20px rgba(37,99,235,0.3)}
.btn-submit:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(37,99,235,0.4)}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;transform:none}
.msg-error{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:8px;padding:10px 14px;font-size:.82rem;color:#ef4444;margin-top:12px;display:none}
.divider{display:flex;align-items:center;gap:12px;margin:22px 0}
.divider-line{flex:1;height:1px;background:var(--border)}
.divider span{font-size:.75rem;color:var(--muted2)}
.link-alt{text-align:center;font-size:.85rem;color:var(--muted)}
.link-alt a{color:var(--blue2);font-weight:500}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
footer{padding:20px 40px;border-top:1px solid var(--border);text-align:center;font-size:.75rem;color:var(--muted2)}
</style>
</head>
<body>
<nav>
  <a href="medicina.html" class="brand">
    <span style="font-family:'Jost',sans-serif;font-size:1.05rem;font-weight:300;letter-spacing:.45em;color:#f0f4ff;text-transform:uppercase;padding-right:.45em">VOFOR</span><span style="display:block;font-size:.48rem;letter-spacing:.22em;color:rgba(240,244,255,0.45);font-family:'DM Sans',sans-serif;font-weight:400;text-transform:uppercase;margin-top:3px">medicina</span>
  </a>
  <a href="medicina.html" class="back-link">← Voltar</a>
</nav>
<main class="main">
  <div class="card">
    <div class="card-eyebrow">Acesso</div>
    <h1 class="card-title">Bem-vindo<br><em>de volta.</em></h1>
    <p class="card-sub">Continue sua preparação de onde parou.</p>
    <form id="form-login">
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="seu@email.com" required>
      </div>
      <div class="field">
        <label>Senha</label>
        <div style="position:relative">
          <input type="password" id="senha" placeholder="Sua senha" required style="padding-right:44px">
          <button type="button" onclick="toggleSenha('senha',this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);padding:0">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="forgot"><a href="#">Esqueci minha senha</a></div>
      <button type="submit" class="btn-submit" id="btn-submit">
        <span id="btn-text">Entrar</span>
        <div class="spinner" id="spinner"></div>
      </button>
      <div class="msg-error" id="msg-error"></div>
    </form>
    <div class="divider"><div class="divider-line"></div><span>ou</span><div class="divider-line"></div></div>
    <div class="link-alt">Não tem conta? <a href="med-cadastro.html">Criar conta grátis →</a></div>
  </div>
</main>
<footer>© 2025 VOFOR Medicina · Estudo com método. Resultado de verdade.</footer>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb=supabase.createClient('https://lklmzhunhiwqsbhnymaw.supabase.co','sb_publishable_DvhwDRaB-L4kO9gOYXgtxw_0jVdsuHU');
document.getElementById('form-login').addEventListener('submit',async(e)=>{
  e.preventDefault();
  const email=document.getElementById('email').value.trim();
  const senha=document.getElementById('senha').value;
  const btn=document.getElementById('btn-submit');
  const txt=document.getElementById('btn-text');
  const spin=document.getElementById('spinner');
  const errEl=document.getElementById('msg-error');
  errEl.style.display='none';
  btn.disabled=true;txt.textContent='Entrando...';spin.style.display='block';
  const{data,error}=await sb.auth.signInWithPassword({email,password:senha});
  btn.disabled=false;txt.textContent='Entrar';spin.style.display='none';
  if(error){errEl.textContent=traduzirErro(error.message);errEl.style.display='block';return;}
  // Verifica se tem perfil medicina
  const{data:perfil}=await sb.from('medicina_perfis').select('id,diagnostico_completo').eq('id',data.user.id).single();
  if(!perfil)window.location.href='med-perfil.html';
  else if(!perfil.diagnostico_completo)window.location.href='med-diagnostico.html';
  else window.location.href='med-painel.html';
});
function toggleSenha(id,btn){
  const input=document.getElementById(id);const show=input.type==='password';
  input.type=show?'text':'password';
  btn.innerHTML=show?'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>':'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
}
function traduzirErro(msg){
  if(msg.includes('Invalid login'))return'Email ou senha incorretos.';
  if(msg.includes('Email not confirmed'))return'Confirme seu email antes de entrar.';
  return'Erro ao entrar. Tente novamente.';
}
</script>
</body>
</html>
