<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vofor ENEM — Redação</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#07050f;--bg2:#100c1e;--bg3:#171030;--bg4:#04030a;--purple:#7c3aed;--purple2:#a78bfa;--purple3:#6d28d9;--purple4:#4c1d95;--violet:#8b5cf6;--text:#f5f3ff;--muted:#8b7da8;--muted2:rgba(139,125,168,0.22);--border:rgba(167,139,250,0.12);--border2:rgba(167,139,250,0.28);--green:#10b981;--red:#ef4444;--gold:#f59e0b;--radius:12px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;-webkit-font-smoothing:antialiased}
.sidebar{width:240px;min-height:100vh;background:linear-gradient(180deg,var(--bg4) 0%,#030208 100%);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100}
.sidebar-header{padding:22px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.nav-vofor{font-family:'Jost',sans-serif;font-size:.95rem;font-weight:300;letter-spacing:.45em;color:var(--text);text-transform:uppercase;line-height:1}
.nav-divider{width:1px;height:12px;background:rgba(167,139,250,0.3);display:inline-block}
.nav-sub{font-family:'Jost',sans-serif;font-size:.5rem;font-weight:300;letter-spacing:.25em;color:rgba(139,125,168,0.55);text-transform:uppercase}
.sb-section{font-size:.62rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(139,125,168,0.4);padding:0 18px;margin:20px 0 7px}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 14px;margin:1px 8px;border-radius:9px;color:var(--muted);text-decoration:none;font-size:.85rem;font-weight:500;transition:all .15s;cursor:pointer}
.nav-item:hover{background:rgba(124,58,237,0.07);color:var(--text)}
.nav-item.active{background:rgba(124,58,237,0.15);color:var(--purple2);border:1px solid rgba(167,139,250,0.2)}
.nav-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(124,58,237,0.08);flex-shrink:0}
.nav-icon svg{stroke:var(--muted);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-item.active .nav-icon svg,.nav-item:hover .nav-icon svg{stroke:var(--purple2)}
.sidebar-footer{padding:12px 8px;border-top:1px solid var(--border);margin-top:auto}
.nup{display:flex;align-items:center;gap:10px;padding:10px;border-radius:9px;cursor:pointer;transition:background .15s}
.nup:hover{background:rgba(124,58,237,0.07)}
.nup-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--purple4),var(--purple3));border:1px solid rgba(167,139,250,0.35);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:600;color:#fff;flex-shrink:0}
.nup-name{font-size:.82rem;font-weight:500}
.nup-sub{font-size:.68rem;color:var(--muted)}
.main{flex:1;margin-left:240px;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:62px;padding:0 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;background:rgba(7,5,15,0.9);backdrop-filter:blur(20px);position:sticky;top:0;z-index:50}
.topbar-title{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:600}
.topbar-title em{font-style:italic;color:var(--purple2)}
.tabs{display:flex;gap:4px;margin-left:auto}
.tab{padding:7px 16px;font-size:.8rem;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif}
.tab.active{color:var(--purple2);border-bottom-color:var(--purple2)}
.content{padding:24px 28px;flex:1;max-width:820px;margin:0 auto;width:100%}
.panel{display:none}
.panel.active{display:block}
.form-group{margin-bottom:18px}
.form-label{font-size:.72rem;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px;display:block}
.form-input,.form-select{width:100%;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:9px;padding:12px 15px;font-size:.9rem;font-family:'DM Sans',sans-serif;outline:none;transition:all .2s;appearance:none;color-scheme:dark}
.form-input:focus,.form-select:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(124,58,237,0.1)}
.form-textarea{width:100%;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:9px;padding:16px;font-size:.93rem;font-family:'DM Sans',sans-serif;outline:none;transition:all .2s;resize:vertical;min-height:280px;line-height:1.75;color-scheme:dark}
.form-textarea:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(124,58,237,0.1)}
.char-count{font-size:.75rem;color:var(--muted);text-align:right;margin-top:5px}
.btn-corrigir{width:100%;padding:14px;background:linear-gradient(135deg,var(--purple3),var(--purple));color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(124,58,237,0.3);margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-corrigir:hover{transform:translateY(-1px)}
.btn-corrigir:disabled{opacity:.6;cursor:not-allowed;transform:none}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.correcao-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-top:20px;display:none}
.cc-head{padding:16px 20px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px}
.cc-nota{font-family:'Cormorant Garamond',serif;font-size:2.5rem;font-weight:700;line-height:1}
.cc-nota-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.cc-body{padding:20px}
.competencias{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.comp{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px}
.comp-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;font-weight:600}
.comp-nota{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;line-height:1;margin-bottom:4px}
.comp-bar{height:3px;background:rgba(124,58,237,0.1);border-radius:2px;margin-top:8px}
.comp-bar-fill{height:3px;border-radius:2px}
.feedback-text{font-size:.88rem;color:var(--muted);line-height:1.75;background:var(--bg3);border-radius:10px;padding:16px;border:1px solid var(--border)}
.feedback-text strong{color:var(--text)}
.hist-item{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:10px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:border-color .2s}
.hist-item:hover{border-color:var(--border2)}
.hist-nota{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700;line-height:1;flex-shrink:0;width:60px;text-align:center}
.hist-tema{font-size:.88rem;font-weight:600;margin-bottom:3px}
.hist-meta{font-size:.75rem;color:var(--muted)}
.hist-empty{text-align:center;padding:60px 20px}
@media(max-width:768px){.sidebar{display:none}.main{margin-left:0}.content{padding:14px}.competencias{grid-template-columns:1fr}}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-header" style="cursor:pointer" onclick="window.location.href='enem.html'">
    <span class="nav-vofor">VOFOR</span>
    <span class="nav-divider"></span>
    <span class="nav-sub">enem</span>
  </div>
  <nav style="flex:1;overflow-y:auto;padding:8px 0">
    <div class="sb-section">Estudos</div>
    <a href="enem-painel.html" class="nav-item"><div class="nav-icon"><svg width="15" height="15" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></div>Painel</a>
    <a href="enem-questoes.html" class="nav-item"><div class="nav-icon"><svg width="15" height="15" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3M12 17h.01"/></svg></div>Questões</a>
    <a href="enem-redacao.html" class="nav-item active"><div class="nav-icon"><svg width="15" height="15" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>Redação</a>
    <a href="enem-plano.html" class="nav-item"><div class="nav-icon"><svg width="15" height="15" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></div>Plano</a>
    <a href="enem-simulado.html" class="nav-item"><div class="nav-icon"><svg width="15" height="15" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>Simulados</a>
    <div class="sb-section">Análise</div>
    <a href="enem-desempenho.html" class="nav-item"><div class="nav-icon"><svg width="15" height="15" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>Desempenho</a>
  </nav>
  <div class="sidebar-footer">
    <div class="nup" onclick="sair()">
      <div class="nup-avatar" id="nav-avatar">?</div>
      <div><div class="nup-name" id="nav-user">—</div><div class="nup-sub">Sair</div></div>
    </div>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-title">Correção de <em>Redação</em></div>
    <div class="tabs">
      <button class="tab active" onclick="showTab('enviar',this)">Enviar redação</button>
      <button class="tab" onclick="showTab('historico',this)">Histórico</button>
    </div>
  </div>
  <div class="content">
    <div class="panel active" id="panel-enviar">
      <div class="form-group">
        <label class="form-label">Tema da redação</label>
        <input class="form-input" id="tema-red" placeholder="Ex: Os desafios da educação digital no Brasil" type="text">
      </div>
      <div class="form-group">
        <label class="form-label">Sua redação</label>
        <textarea class="form-textarea" id="texto-red" placeholder="Digite ou cole sua redação aqui..." oninput="updateCount()"></textarea>
        <div class="char-count" id="char-count">0 palavras</div>
      </div>
      <button class="btn-corrigir" id="btn-corrigir" onclick="corrigir()">
        <div class="spinner" id="spinner"></div>
        <span id="btn-txt">✦ Corrigir com IA — Padrão ENEM</span>
      </button>
      <div class="correcao-card" id="correcao-card">
        <div class="cc-head">
          <div><div class="cc-nota" id="cc-nota">—</div><div class="cc-nota-label">pontos / 1000</div></div>
          <div style="flex:1;margin-left:16px"><div style="font-size:.82rem;font-weight:600;margin-bottom:4px" id="cc-tema">—</div><div style="font-size:.72rem;color:var(--muted)">ENEM · 5 Competências</div></div>
        </div>
        <div class="cc-body">
          <div class="competencias" id="competencias"></div>
          <div class="feedback-text" id="feedback-text"></div>
        </div>
      </div>
    </div>
    <div class="panel" id="panel-historico">
      <div id="hist-list"><div style="text-align:center;padding:40px;color:var(--muted)">Carregando...</div></div>
    </div>
  </div>
</div>

<script>
const sb=supabase.createClient('https://lklmzhunhiwqsbhnymaw.supabase.co','sb_publishable_DvhwDRaB-L4kO9gOYXgtxw_0jVdsuHU');
let userId=null;

async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='enem-login.html';return;}
  userId=session.user.id;
  const nome=session.user.user_metadata?.full_name||session.user.email.split('@')[0];
  document.getElementById('nav-avatar').textContent=nome.substring(0,2).toUpperCase();
  document.getElementById('nav-user').textContent=nome;
}

function updateCount(){
  const txt=document.getElementById('texto-red').value;
  const words=txt.trim().split(/\s+/).filter(w=>w.length>0).length;
  document.getElementById('char-count').textContent=words+' palavras';
}

async function corrigir(){
  const tema=document.getElementById('tema-red').value.trim();
  const texto=document.getElementById('texto-red').value.trim();
  if(!tema){alert('Digite o tema da redação.');return;}
  if(texto.length<200){alert('Redação muito curta. Mínimo 200 caracteres.');return;}
  const btn=document.getElementById('btn-corrigir');
  btn.disabled=true;document.getElementById('spinner').style.display='block';document.getElementById('btn-txt').textContent='Corrigindo...';
  document.getElementById('correcao-card').style.display='none';
  const prompt=`Você é corretor especialista em redação ENEM (INEP).
Corrija a redação abaixo usando exatamente os critérios das 5 competências ENEM.

Tema: "${tema}"
Redação: "${texto}"

Retorne SOMENTE JSON sem markdown:
{
  "nota_total": 640,
  "nota_c1": 160, "nota_c2": 120, "nota_c3": 160, "nota_c4": 120, "nota_c5": 80,
  "label_c1": "Domínio da norma culta",
  "label_c2": "Compreensão da proposta",
  "label_c3": "Seleção de argumentos",
  "label_c4": "Coesão e coerência",
  "label_c5": "Proposta de intervenção",
  "feedback": "Análise detalhada com pontos fortes e o que melhorar em cada competência. Seja específico e construtivo."
}
Notas de 0 a 200 por competência (múltiplos de 40). Total de 0 a 1000.`;

  try{
    const r=await fetch('/api/groq',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'user',content:prompt}],max_tokens:800,temperature:0.3})});
    const json=await r.json();
    let txt2=json.choices?.[0]?.message?.content||'';
    txt2=txt2.replace(/```json|```/g,'').trim();
    const res=JSON.parse(txt2);
    await sb.from('enem_redacoes').insert({user_id:userId,tema,texto,nota_total:res.nota_total,nota_c1:res.nota_c1,nota_c2:res.nota_c2,nota_c3:res.nota_c3,nota_c4:res.nota_c4,nota_c5:res.nota_c5,feedback:res.feedback});
    document.getElementById('cc-nota').textContent=res.nota_total;
    document.getElementById('cc-tema').textContent=tema;
    const notaCor=res.nota_total>=700?'var(--green)':res.nota_total>=500?'var(--gold)':'var(--red)';
    document.getElementById('cc-nota').style.color=notaCor;
    const comps=[
      {label:res.label_c1||'C1 — Norma culta',nota:res.nota_c1},
      {label:res.label_c2||'C2 — Proposta',nota:res.nota_c2},
      {label:res.label_c3||'C3 — Argumentação',nota:res.nota_c3},
      {label:res.label_c4||'C4 — Coesão',nota:res.nota_c4},
      {label:res.label_c5||'C5 — Intervenção',nota:res.nota_c5},
    ];
    document.getElementById('competencias').innerHTML=comps.map(c=>{
      const pct=Math.round(c.nota/200*100);
      const cor=pct>=70?'var(--green)':pct>=50?'var(--gold)':'var(--red)';
      return`<div class="comp"><div class="comp-label">${c.label}</div><div class="comp-nota" style="color:${cor}">${c.nota}<span style="font-size:.9rem;font-weight:400;color:var(--muted)">/200</span></div><div class="comp-bar"><div class="comp-bar-fill" style="width:${pct}%;background:${cor}"></div></div></div>`;
    }).join('');
    document.getElementById('feedback-text').innerHTML=res.feedback.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
    document.getElementById('correcao-card').style.display='block';
    document.getElementById('correcao-card').scrollIntoView({behavior:'smooth',block:'start'});
  }catch(e){alert('Erro ao corrigir. Tente novamente.');}
  btn.disabled=false;document.getElementById('spinner').style.display='none';document.getElementById('btn-txt').textContent='✦ Corrigir com IA — Padrão ENEM';
}

async function carregarHistorico(){
  const{data}=await sb.from('enem_redacoes').select('*').eq('user_id',userId).order('created_at',{ascending:false});
  const el=document.getElementById('hist-list');
  if(!data||!data.length){el.innerHTML='<div class="hist-empty"><div style="font-size:2.5rem;margin-bottom:14px">✍️</div><div style="font-family:\'Cormorant Garamond\',serif;font-size:1.4rem;font-weight:700;margin-bottom:6px">Nenhuma redação enviada</div><div style="font-size:.85rem;color:var(--muted)">Envie sua primeira redação para corrigir com IA.</div></div>';return;}
  el.innerHTML=data.map(r=>{
    const dt=new Date(r.created_at).toLocaleDateString('pt-BR');
    const cor=r.nota_total>=700?'var(--green)':r.nota_total>=500?'var(--gold)':'var(--red)';
    return`<div class="hist-item"><div class="hist-nota" style="color:${cor}">${r.nota_total||'—'}</div><div style="flex:1"><div class="hist-tema">${r.tema}</div><div class="hist-meta">ENEM · ${dt}</div></div></div>`;
  }).join('');
}

function showTab(nome,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-'+nome).classList.add('active');
  if(nome==='historico')carregarHistorico();
}

async function sair(){await sb.auth.signOut();window.location.href='enem.html';}
init();
</script>
</body>
</html>
