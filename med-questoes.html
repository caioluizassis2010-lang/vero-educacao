<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vofor Medicina — Questões</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#060912;--bg2:#0d1425;--bg3:#131d35;--bg4:#0a0f1e;--blue:#2563eb;--blue2:#3b82f6;--blue3:#1d4ed8;--blue4:#1e3a8a;--cyan:#06b6d4;--text:#f0f4ff;--muted:#8896b3;--muted2:rgba(136,150,179,0.22);--border:rgba(59,130,246,0.12);--border2:rgba(59,130,246,0.28);--green:#10b981;--red:#ef4444;--radius:12px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;-webkit-font-smoothing:antialiased}
.sidebar{width:240px;min-height:100vh;background:linear-gradient(180deg,var(--bg4) 0%,#080c1a 100%);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100}
.sidebar-header{padding:22px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.brand-icon{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,var(--blue4),var(--blue3));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;box-shadow:0 4px 16px rgba(37,99,235,0.35)}
.brand-name{font-family:'Cormorant Garamond',serif;font-size:.95rem;font-weight:600;letter-spacing:.08em;line-height:1}
.brand-name span{display:block;font-size:.42rem;letter-spacing:.22em;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:400;text-transform:uppercase;margin-top:3px}
.sb-section{font-size:.62rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(136,150,179,0.4);padding:0 18px;margin:20px 0 7px}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 14px;margin:1px 8px;border-radius:9px;color:var(--muted);text-decoration:none;font-size:.85rem;font-weight:500;transition:all .15s;cursor:pointer}
.nav-item:hover{background:rgba(59,130,246,0.07);color:var(--text)}
.nav-item.active{background:rgba(37,99,235,0.15);color:var(--blue2);border:1px solid rgba(59,130,246,0.2)}
.nav-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(59,130,246,0.08);flex-shrink:0}
.nav-icon svg{stroke:var(--muted)}
.nav-item.active .nav-icon svg,.nav-item:hover .nav-icon svg{stroke:var(--blue2)}
.sidebar-footer{padding:12px 8px;border-top:1px solid var(--border);margin-top:auto}
.nup{display:flex;align-items:center;gap:10px;padding:10px;border-radius:9px;cursor:pointer;transition:background .15s}
.nup:hover{background:rgba(59,130,246,0.07)}
.nup-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--blue4),var(--blue3));border:1px solid rgba(59,130,246,0.35);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:600;color:#fff;flex-shrink:0}
.nup-name{font-size:.82rem;font-weight:500}
.nup-sub{font-size:.68rem;color:var(--muted)}

.main{flex:1;margin-left:240px;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:62px;padding:0 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;background:rgba(6,9,18,0.9);backdrop-filter:blur(20px);position:sticky;top:0;z-index:50}
.topbar-title{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:600}
.topbar-title em{font-style:italic;color:var(--blue2)}
.hoje-badge{font-size:.72rem;font-weight:600;padding:3px 10px;border-radius:20px;background:rgba(37,99,235,0.1);color:var(--blue2);border:1px solid rgba(59,130,246,0.2);margin-left:auto}

.content{padding:24px 28px;flex:1;max-width:760px;margin:0 auto;width:100%}

/* FILTROS */
.filtros{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap}
.filtro-select{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:9px 14px;font-size:.82rem;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:all .2s;appearance:none;color-scheme:dark;min-width:140px}
.filtro-select:focus{border-color:var(--blue)}
.btn-gerar{padding:9px 20px;background:linear-gradient(135deg,var(--blue3),var(--blue));color:#fff;border:none;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;box-shadow:0 3px 14px rgba(37,99,235,0.25)}
.btn-gerar:hover{transform:translateY(-1px)}
.btn-gerar:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* QUESTÃO */
.q-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.q-card-head{padding:14px 20px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.q-disc-badge{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:100px;background:rgba(37,99,235,0.15);color:var(--blue2);border:1px solid rgba(59,130,246,0.25)}
.q-vest-badge{font-size:.68rem;color:var(--muted);padding:3px 10px;border-radius:100px;background:rgba(136,150,179,0.08);border:1px solid var(--border)}
.q-card-body{padding:22px 24px}
.q-text{font-size:1rem;line-height:1.75;margin-bottom:22px;color:var(--text)}
.q-opts{display:flex;flex-direction:column;gap:9px}
.q-opt{padding:12px 18px;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:all .2s;display:flex;align-items:flex-start;gap:13px;font-family:'DM Sans',sans-serif;color:var(--text);font-size:.9rem;line-height:1.5;text-align:left;width:100%}
.q-opt:hover:not(:disabled){border-color:var(--border2);background:rgba(59,130,246,0.05)}
.q-opt.correct{border-color:var(--green)!important;background:rgba(16,185,129,0.08)!important;color:var(--green)!important}
.q-opt.wrong{border-color:var(--red)!important;background:rgba(239,68,68,0.08)!important;color:var(--red)!important}
.q-opt:disabled{cursor:not-allowed}
.opt-letter{width:26px;height:26px;border-radius:7px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0;color:var(--muted)}
.q-opt.correct .opt-letter{border-color:var(--green);background:rgba(16,185,129,0.15);color:var(--green)}
.q-opt.wrong .opt-letter{border-color:var(--red);background:rgba(239,68,68,0.15);color:var(--red)}
.q-feedback{padding:14px 18px;border-radius:10px;font-size:.87rem;line-height:1.65;margin:16px 0 4px;display:none}
.q-feedback.acerto{background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.25);color:var(--green)}
.q-feedback.erro{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);color:var(--red)}
.btn-prox{width:100%;padding:12px;background:linear-gradient(135deg,var(--blue3),var(--blue));color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;margin-top:14px;display:none;box-shadow:0 3px 14px rgba(37,99,235,0.25)}
.btn-prox:hover{transform:translateY(-1px)}

/* STATES */
.empty{text-align:center;padding:60px 20px}
.empty-icon{font-size:2.5rem;margin-bottom:16px}
.empty-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;margin-bottom:8px}
.empty-sub{font-size:.87rem;color:var(--muted);margin-bottom:24px}
.loading-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:40px;text-align:center}
.loading-anim{font-size:2rem;animation:pulse 1.2s infinite;margin-bottom:14px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.loading-txt{font-size:.9rem;color:var(--muted)}
.prog-bar-bg{height:4px;background:rgba(59,130,246,0.1);border-radius:2px;margin:20px 0}
.prog-bar-fill{height:4px;border-radius:2px;background:linear-gradient(90deg,var(--blue3),var(--cyan));transition:width .4s}

/* SESSÃO COMPLETA */
.sessao-ok{text-align:center;padding:60px 20px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius)}
.sessao-icon{font-size:3rem;margin-bottom:18px}
.sessao-title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700;margin-bottom:8px}
.sessao-sub{font-size:.9rem;color:var(--muted);margin-bottom:28px}
.sessao-stats{display:flex;justify-content:center;gap:32px;margin-bottom:28px}
.ss{text-align:center}
.ss-n{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;line-height:1}
.ss-l{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:4px}
.btn-mais{padding:11px 24px;background:rgba(37,99,235,0.1);color:var(--blue2);border:1px solid rgba(59,130,246,0.25);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:.87rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-mais:hover{background:rgba(37,99,235,0.18)}

@media(max-width:768px){.sidebar{display:none}.main{margin-left:0}.content{padding:14px}}

.q-text-base{
  background:rgba(255,255,255,0.04);
  border-left:3px solid var(--blue2,#a78bfa);
  border-radius:0 8px 8px 0;
  padding:14px 18px;
  font-size:.88rem;
  color:var(--muted);
  line-height:1.75;
  margin-bottom:16px;
  font-style:italic;
}
.q-explicacao-didatica{
  margin-top:14px;
  padding:16px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:10px;
}
.q-did-title{
  font-size:.78rem;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:10px;
  opacity:.7;
}
.q-explicacao-didatica br+br{margin-top:8px;}
</style>
</head>

      </select>

<script>
const sb=supabase.createClient('https://lklmzhunhiwqsbhnymaw.supabase.co','sb_publishable_DvhwDRaB-L4kO9gOYXgtxw_0jVdsuHU');
let userId=null, perfil=null, hojeQtd=0, hojeAcertos=0, qAtual=null;
const MAX=20;

async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='med-login.html';return;}
  userId=session.user.id;
  const nome=session.user.user_metadata?.full_name||session.user.email.split('@')[0];
  document.getElementById('nav-avatar').textContent=nome.substring(0,2).toUpperCase();
  document.getElementById('nav-user').textContent=nome;
  const{data:p}=await sb.from('medicina_perfis').select('*').eq('id',userId).single();
  if(!p||!p.diagnostico_completo){window.location.href='med-painel.html';return;}
  perfil=p;
  if(p.vestibular_alvo){
    document.getElementById('vestibular-label').textContent=p.vestibular_alvo;
    document.getElementById('f-vestibular').value=p.vestibular_alvo.toUpperCase().includes('FUVEST')?'FUVEST':p.vestibular_alvo;
  }
  await carregarHoje();
}

async function carregarHoje(){
  const hoje=new Date().toISOString().split('T')[0];
  const{data}=await sb.from('medicina_questoes').select('acertou').eq('user_id',userId).gte('created_at',hoje);
  hojeQtd=data?.length||0;hojeAcertos=data?.filter(q=>q.acertou).length||0;
  document.getElementById('badge-hoje').textContent=`${hojeQtd} / ${MAX} hoje`;
  document.getElementById('prog-fill').style.width=Math.min(hojeQtd/MAX*100,100)+'%';
  if(hojeQtd>=MAX)mostrarSessaoConcluida();
}

// Rastreia enunciados já vistos para evitar repetição
const questoesVistas = new Set();

async function gerarQuestao(){
  if(hojeQtd>=MAX){mostrarSessaoConcluida();return;}
  // Disciplinas ponderadas — peso real nos vestibulares de medicina
  // Bio/Quím/Fís = 60%, Mat = 15%, Port/Lit = 10%, Humanas = 10%, Inglês/Esp = 5%
  const DISC_MED_POOL = [
    'Biologia','Biologia','Biologia','Biologia','Biologia',
    'Química','Química','Química','Química',
    'Física','Física','Física',
    'Matemática','Matemática',
    'Português','Literatura Brasileira',
    'História','Geografia',
    'Filosofia','Inglês',
  ];
  // Assuntos por disciplina — sorteia diferente a cada chamada para evitar repetição
  const ASSUNTOS_MED = {
    'Biologia':['Citologia','Genética Mendeliana','Genética Molecular','Evolução','Ecologia','Fisiologia Humana','Histologia','Embriologia','Botânica','Zoologia','Microbiologia','Imunologia','Bioquímica Celular','Biotecnologia','Vírus e Bactérias'],
    'Química':['Tabela Periódica','Ligações Químicas','Funções Orgânicas','Reações Orgânicas','Termoquímica','Cinética Química','Equilíbrio Químico','Eletroquímica','Soluções','Estequiometria','Radioatividade','Polímeros','Isomeria','Oxidação e Redução'],
    'Física':['Mecânica Clássica','Leis de Newton','Energia e Trabalho','Termodinâmica','Óptica Geométrica','Eletrostática','Eletrodinâmica','Magnetismo','Ondas','Física Moderna','Radioatividade','Gravitação','Hidrostática','Acústica'],
    'Matemática':['Funções','Geometria Analítica','Trigonometria','Matrizes','Probabilidade','Progressões','Logaritmos','Polinômios','Geometria Plana','Geometria Espacial','Estatística','Combinatória','Números Complexos','Sequências'],
    'Português':['Interpretação de Texto Científico','Coesão e Coerência','Sintaxe','Morfologia','Ortografia','Pontuação','Semântica','Figuras de Linguagem','Concordância','Regência'],
    'Literatura Brasileira':['Modernismo','Realismo','Naturalismo','Romantismo','Barroco','Arcadismo','Simbolismo','Parnasianismo','Pré-Modernismo','Literatura Contemporânea'],
    'História':['Gripe Espanhola 1918','Revolução Industrial e Saúde','História da Medicina','Epidemias Históricas','Oswaldo Cruz e Saúde Pública','História do SUS','Ditadura e Saúde','República Velha e Saúde','Segunda Guerra e Medicina','Descobertas Científicas'],
    'Geografia':['Epidemiologia Regional','Biomas e Saúde','Distribuição de Doenças','Saneamento e Saúde','Urbanização e Saúde','Clima e Doenças','Saúde em Regiões Brasileiras','Geopolítica da Saúde','Desigualdade Regional e Saúde'],
    'Filosofia':['Bioética','Ética Médica','Filosofia da Ciência','Dilemas Morais na Medicina','Utilitarismo e Saúde','Kant e Ética Profissional','Direitos do Paciente'],
    'Inglês':['Abstract Científico','Vocabulário Médico em Inglês','Leitura de Artigo Científico','Terminologia Médica','False Cognates Médicos'],
  };
  const disc = document.getElementById('f-disciplina').value ||
    DISC_MED_POOL[Math.floor(Math.random()*DISC_MED_POOL.length)];
  // Sorteia assunto diferente a cada chamada
  const assuntosDisc = ASSUNTOS_MED[disc] || ['Conteúdo geral'];
  const assunto = assuntosDisc[Math.floor(Math.random()*assuntosDisc.length)];
  // Normaliza vestibular — pode ter múltiplos separados por vírgula
  const vestRaw=document.getElementById('f-vestibular').value||perfil.vestibular_alvo||'FUVEST';
  const vestList=['FUVEST','COMVEST','FAMERP','FCMSCSP','FMABC','UNIFESP','UERJ','FAMEMA','UEL','ACAFE','BAHIANA','UNIFOR','UFMG','UFRJ','UFBA','UFC','UFPE'];
  // Se tem múltiplos, pega o primeiro que reconhecemos, senão FUVEST
  let vest='FUVEST';
  const partes=vestRaw.toUpperCase().split(/[,\s]+/);
  for(const p of partes){
    const match=vestList.find(v=>p.includes(v)||v.includes(p));
    if(match){vest=match;break;}
  }
  const btn=document.getElementById('btn-gerar');
  btn.disabled=true;
  document.getElementById('q-container').innerHTML=`<div class="loading-card"><div class="loading-anim">🧬</div><div class="loading-txt">Gerando questão de ${disc} — estilo ${vest}...</div></div>`;
  try{
    const r=await fetch('/api/gerar-questao',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        sistema:'medicina',
        vestibular:vest,
        disciplina:disc||null,
        assunto:assunto||null,
        nivel_aluno:perfil?.nivel||'intermediario',
        usar_banco:false
      })
    });
    const respText=await r.text();
    let json;
    try{json=JSON.parse(respText);}
    catch(e){throw new Error('API retornou resposta inválida ('+r.status+'). Tente novamente.');}
    if(!r.ok)throw new Error(json?.error||'Erro '+r.status+' na API');
    if(!json.enunciado)throw new Error('Questão inválida');
    // Anti-repetição — descarta se já foi vista nesta sessão
    const _key = json.enunciado.substring(0,80);
    if(questoesVistas.has(_key)){
      btn.disabled=false;
      setTimeout(gerarQuestao, 100); // pede nova automaticamente
      return;
    }
    questoesVistas.add(_key);
    // Normaliza opções
    if(json.opcoes&&typeof json.opcoes[0]==='string'){
      json.opcoes=json.opcoes.map((op,i)=>({letra:['A','B','C','D','E'][i],texto:op.replace(/^[A-E]\)\s*/,'')}));
    }
    qAtual=json;
    renderQuestao(qAtual);
  }catch(e){
    document.getElementById('q-container').innerHTML=`<div class="loading-card"><div style="color:var(--red);font-size:.9rem">Erro ao gerar questão. Tente novamente.</div></div>`;
  }
  btn.disabled=false;
}

function renderQuestao(q){
  const letras=['A','B','C','D','E'];
  document.getElementById('q-container').innerHTML=`
    <div class="q-card">
      <div class="q-card-head">
        <span class="q-disc-badge">${q.disciplina}</span>
        <span class="q-vest-badge">${q.vestibular||perfil.vestibular_alvo}</span>
        <span style="font-size:.75rem;color:var(--muted);margin-left:auto">${q.assunto||''}</span>
      </div>
      <div class="q-card-body">
        ${q.texto_base ? `<div class="q-text-base">${q.texto_base}</div>` : ''}
        <div class="q-text">${q.enunciado}</div>
        <div class="q-opts">
          ${q.opcoes.map((op,i)=>{
            const letraOp=typeof op==='object'?op.letra:letras[i];
            const textoOp=typeof op==='object'?op.texto:op.replace(/^[A-E]\)\s*/,'');
            return `<button class="q-opt" onclick="responder('${letraOp}')">
              <div class="opt-letter">${letraOp}</div>
              <span>${textoOp}</span>
            </button>`;
          }).join('')}
        </div>
        <div class="q-feedback" id="q-feedback"></div>
        <button class="btn-prox" id="btn-prox" onclick="gerarQuestao()">Próxima questão →</button>
      </div>
    </div>`;
}

async function responder(letra){
  const q=qAtual;if(!q)return;
  document.querySelectorAll('.q-opt').forEach(b=>b.disabled=true);
  const acertou=letra===q.gabarito;
  document.querySelectorAll('.q-opt').forEach(b=>{
    const l=b.querySelector('.opt-letter').textContent;
    if(l===q.gabarito)b.classList.add('correct');
    else if(l===letra&&!acertou)b.classList.add('wrong');
  });
  const fb=document.getElementById('q-feedback');
  fb.className='q-feedback '+(acertou?'acerto':'erro');
  fb.innerHTML=(acertou?'<strong>✓ Correto!</strong> ':'<strong>✗ Incorreto.</strong> ')+(q.explicacao_curta||q.explicacao||'');
    // Mostra explicação didática completa
    if(q.explicacao_didatica){
      const did=document.createElement('div');
      did.className='q-explicacao-didatica';
      did.innerHTML='<div class="q-did-title">📖 Entenda o conteúdo</div>'+q.explicacao_didatica.replace(/\n/g,'<br>');
      fb.appendChild(did);
    }
  fb.style.display='block';
  document.getElementById('btn-prox').style.display='block';
  hojeQtd++;if(acertou)hojeAcertos++;
  document.getElementById('badge-hoje').textContent=`${hojeQtd} / ${MAX} hoje`;
  document.getElementById('prog-fill').style.width=Math.min(hojeQtd/MAX*100,100)+'%';
  await sb.from('medicina_questoes').insert({user_id:userId,disciplina:q.disciplina,assunto:q.assunto,enunciado:q.enunciado,gabarito:q.gabarito,acertou,vestibular:q.vestibular||perfil.vestibular_alvo});
  if(hojeQtd>=MAX){document.getElementById('btn-prox').textContent='Ver resultado →';document.getElementById('btn-prox').onclick=mostrarSessaoConcluida;}
}

function mostrarSessaoConcluida(){
  const taxa=hojeQtd>0?Math.round(hojeAcertos/hojeQtd*100):0;
  document.getElementById('q-container').innerHTML=`
    <div class="sessao-ok">
      <div class="sessao-icon">🎉</div>
      <div class="sessao-title">Sessão concluída!</div>
      <div class="sessao-sub">Você completou suas ${MAX} questões de hoje.</div>
      <div class="sessao-stats">
        <div class="ss"><div class="ss-n">${hojeQtd}</div><div class="ss-l">Respondidas</div></div>
        <div class="ss"><div class="ss-n" style="color:var(--green)">${hojeAcertos}</div><div class="ss-l">Acertos</div></div>
        <div class="ss"><div class="ss-n" style="color:var(--blue2)">${taxa}%</div><div class="ss-l">Taxa</div></div>
      </div>
      <button class="btn-mais" onclick="hojeQtd=0;gerarQuestao()">Continuar praticando</button>
    </div>`;
}

async function sair(){await sb.auth.signOut();window.location.href='medicina.html';}
init();
</script>
</body>
</html>
