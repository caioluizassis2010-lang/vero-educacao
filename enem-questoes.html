<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vofor ENEM — Questões</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#07050f;--bg2:#100c1e;--bg3:#171030;--bg4:#04030a;--purple:#7c3aed;--purple2:#a78bfa;--purple3:#6d28d9;--purple4:#4c1d95;--violet:#8b5cf6;--text:#f5f3ff;--muted:#8b7da8;--muted2:rgba(139,125,168,0.22);--border:rgba(167,139,250,0.12);--border2:rgba(167,139,250,0.28);--green:#10b981;--red:#ef4444;--radius:12px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;-webkit-font-smoothing:antialiased}
.sidebar{width:240px;min-height:100vh;background:linear-gradient(180deg,var(--bg4) 0%,#030208 100%);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100}
.sidebar-header{padding:22px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.nav-vofor{font-family:'Jost',sans-serif;font-size:.95rem;font-weight:300;letter-spacing:.45em;color:var(--text);text-transform:uppercase;line-height:1}
.nav-divider{width:1px;height:12px;background:rgba(167,139,250,0.3);display:inline-block}
.nav-sub{font-family:'Jost',sans-serif;font-size:.5rem;font-weight:300;letter-spacing:.25em;color:rgba(139,125,168,0.55);text-transform:uppercase}
.sb-section{font-size:.62rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(139,125,168,0.4);padding:0 18px;margin:20px 0 7px}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 14px;margin:1px 8px;border-radius:9px;color:var(--muted);text-decoration:none;font-size:.85rem;font-weight:500;transition:all .15s;cursor:pointer}
.nav-item:hover{background:rgba(124,58,237,0.07);color:var(--text)}
.nav-item.active{background:rgba(124,58,237,0.15);color:var(--purple2);border:1px solid rgba(167,139,250,0.2)}
.nav-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(124,58,237,0.08);flex-shrink:0}
.nav-icon svg{stroke:var(--muted);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-item.active .nav-icon svg,.nav-item:hover .nav-icon svg{stroke:var(--purple2)}
.sidebar-footer{padding:12px 8px;border-top:1px solid var(--border);margin-top:auto}
.nup{display:flex;align-items:center;gap:10px;padding:10px;border-radius:9px;cursor:pointer;transition:background .15s}
.nup:hover{background:rgba(124,58,237,0.07)}
.nup-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--purple4),var(--purple3));border:1px solid rgba(167,139,250,0.35);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:600;color:#fff;flex-shrink:0}
.nup-name{font-size:.82rem;font-weight:500}
.nup-sub{font-size:.68rem;color:var(--muted)}

.main{flex:1;margin-left:240px;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:62px;padding:0 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;background:rgba(7,5,15,0.9);backdrop-filter:blur(20px);position:sticky;top:0;z-index:50}
.topbar-title{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:600}
.topbar-title em{font-style:italic;color:var(--purple2)}
.hoje-badge{font-size:.72rem;font-weight:600;padding:3px 10px;border-radius:20px;background:rgba(124,58,237,0.1);color:var(--purple2);border:1px solid rgba(167,139,250,0.2);margin-left:auto}

.content{padding:24px 28px;flex:1;max-width:760px;margin:0 auto;width:100%}

/* ÁREA TABS */
.area-tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.area-tab{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.8rem;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;font-weight:500}
.area-tab:hover{border-color:var(--border2);color:var(--text)}
.area-tab.active{background:rgba(124,58,237,0.15);color:var(--purple2);border-color:rgba(167,139,250,0.3);font-weight:600}

.filtros{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.filtro-select{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:9px 14px;font-size:.82rem;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:all .2s;appearance:none;color-scheme:dark;min-width:160px}
.filtro-select:focus{border-color:var(--purple)}
.btn-gerar{padding:9px 20px;background:linear-gradient(135deg,var(--purple3),var(--purple));color:#fff;border:none;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;box-shadow:0 3px 14px rgba(124,58,237,0.25)}
.btn-gerar:hover{transform:translateY(-1px)}
.btn-gerar:disabled{opacity:.5;cursor:not-allowed;transform:none}

.prog-bar-bg{height:4px;background:rgba(124,58,237,0.1);border-radius:2px;margin-bottom:18px}
.prog-bar-fill{height:4px;border-radius:2px;background:linear-gradient(90deg,var(--purple3),var(--violet));transition:width .4s}

/* QUESTÃO */
.q-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.q-card-head{padding:14px 20px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.q-area-badge{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:100px;background:rgba(124,58,237,0.15);color:var(--purple2);border:1px solid rgba(167,139,250,0.25)}
.q-disc-badge{font-size:.68rem;color:var(--muted);padding:3px 10px;border-radius:100px;background:rgba(139,125,168,0.08);border:1px solid var(--border)}
.q-card-body{padding:22px 24px}
.q-text{font-size:1rem;line-height:1.75;margin-bottom:22px}
.q-opts{display:flex;flex-direction:column;gap:9px}
.q-opt{padding:12px 18px;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:all .2s;display:flex;align-items:flex-start;gap:13px;font-family:'DM Sans',sans-serif;color:var(--text);font-size:.9rem;line-height:1.5;text-align:left;width:100%}
.q-opt:hover:not(:disabled){border-color:var(--border2);background:rgba(124,58,237,0.05)}
.q-opt.correct{border-color:var(--green)!important;background:rgba(16,185,129,0.08)!important;color:var(--green)!important}
.q-opt.wrong{border-color:var(--red)!important;background:rgba(239,68,68,0.08)!important;color:var(--red)!important}
.q-opt:disabled{cursor:not-allowed}
.opt-letter{width:26px;height:26px;border-radius:7px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0;color:var(--muted)}
.q-opt.correct .opt-letter{border-color:var(--green);background:rgba(16,185,129,0.15);color:var(--green)}
.q-opt.wrong .opt-letter{border-color:var(--red);background:rgba(239,68,68,0.15);color:var(--red)}
.q-feedback{padding:14px 18px;border-radius:10px;font-size:.87rem;line-height:1.65;margin:16px 0 4px;display:none}
.q-feedback.acerto{background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.25);color:var(--green)}
.q-feedback.erro{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);color:var(--red)}
.btn-prox{width:100%;padding:12px;background:linear-gradient(135deg,var(--purple3),var(--purple));color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;margin-top:14px;display:none;box-shadow:0 3px 14px rgba(124,58,237,0.25)}
.btn-prox:hover{transform:translateY(-1px)}

.empty{text-align:center;padding:60px 20px}
.empty-icon{font-size:2.5rem;margin-bottom:16px}
.empty-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;margin-bottom:8px}
.empty-sub{font-size:.87rem;color:var(--muted);margin-bottom:24px}
.loading-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:40px;text-align:center}
.loading-anim{font-size:2rem;animation:pulse 1.2s infinite;margin-bottom:14px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.loading-txt{font-size:.9rem;color:var(--muted)}
.sessao-ok{text-align:center;padding:60px 20px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius)}
.sessao-stats{display:flex;justify-content:center;gap:32px;margin-bottom:28px}
.ss-n{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;line-height:1}
.ss-l{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:4px}
.btn-mais{padding:11px 24px;background:rgba(124,58,237,0.1);color:var(--purple2);border:1px solid rgba(167,139,250,0.25);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:.87rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-mais:hover{background:rgba(124,58,237,0.18)}
@media(max-width:768px){.sidebar{display:none}.main{margin-left:0}.content{padding:14px}}

.q-text-base{
  background:rgba(255,255,255,0.04);
  border-left:3px solid var(--blue2,#a78bfa);
  border-radius:0 8px 8px 0;
  padding:14px 18px;
  font-size:.88rem;
  color:var(--muted);
  line-height:1.75;
  margin-bottom:16px;
  font-style:italic;
}
.q-explicacao-didatica{
  margin-top:14px;
  padding:16px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:10px;
}
.q-did-title{
  font-size:.78rem;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:10px;
  opacity:.7;
}
.q-explicacao-didatica br+br{margin-top:8px;}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-header" style="cursor:pointer" onclick="window.location.href='enem.html'">
    <span class="nav-vofor">VOFOR</span>
    <span class="nav-divider"></span>
    <span class="nav-sub">enem</span>
  </div>
  <nav style="flex:1;overflow-y:auto;padding:8px 0">
    <div class="sb-section">Estudos</div>
    <a href="enem-painel.html" class="nav-item"><div class="nav-icon"><svg width="15" height="15" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></div>Painel</a>
    <a href="enem-questoes.html" class="nav-item active"><div class="nav-icon"><svg width="15" height="15" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3M12 17h.01"/></svg></div>Questões</a>
    <a href="enem-redacao.html" class="nav-item"><div class="nav-icon"><svg width="15" height="15" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>Redação</a>
    <a href="enem-plano.html" class="nav-item"><div class="nav-icon"><svg width="15" height="15" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></div>Plano</a>
    <a href="enem-simulado.html" class="nav-item"><div class="nav-icon"><svg width="15" height="15" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>Simulados</a>

</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-title">Questões <em>ENEM</em></div>
    <div class="hoje-badge" id="badge-hoje">0 / 20 hoje</div>
  </div>
  <div class="content">
    <!-- Tabs de área -->
    <div class="area-tabs">
      <button class="area-tab active" onclick="selArea(this,'')">Todas</button>
      <button class="area-tab" onclick="selArea(this,'linguagens')">Linguagens</button>
      <button class="area-tab" onclick="selArea(this,'matematica')">Matemática</button>
      <button class="area-tab" onclick="selArea(this,'natureza')">Ciências da Natureza</button>
      <button class="area-tab" onclick="selArea(this,'humanas')">Ciências Humanas</button>
    </div>

    <div class="filtros">
      <select class="filtro-select" id="f-disciplina">
        <option value="">Disciplina (todas)</option>
        <option>Português</option><option>Literatura</option><option>Inglês</option>
        <option>Matemática</option><option>Física</option><option>Química</option>
        <option>Biologia</option><option>História</option><option>Geografia</option>
        <option>Filosofia</option><option>Sociologia</option>
      </select>
      <button class="btn-gerar" id="btn-gerar" onclick="gerarQuestao()">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Gerar questão
      </button>
    </div>

    <div class="prog-bar-bg"><div class="prog-bar-fill" id="prog-fill" style="width:0%"></div></div>
    <div id="q-container">
      <div class="empty">
        <div class="empty-icon">🎯</div>
        <div class="empty-title">Pronto para praticar?</div>
        <div class="empty-sub">Selecione a área e clique em Gerar questão.</div>
      </div>
    </div>
  </div>
</div>

<script>
const sb=supabase.createClient('https://lklmzhunhiwqsbhnymaw.supabase.co','sb_publishable_DvhwDRaB-L4kO9gOYXgtxw_0jVdsuHU');
let userId=null, perfil=null, hojeQtd=0, hojeAcertos=0, qAtual=null;
let areaSelecionada='';
const MAX=20;

const AREA_LABELS={'linguagens':'Linguagens','matematica':'Matemática','natureza':'Ciências da Natureza','humanas':'Ciências Humanas','':`Todas as áreas`};
const AREA_CORES={'linguagens':'#a78bfa','matematica':'#6366f1','natureza':'#06b6d4','humanas':'#f59e0b','':`#a78bfa`};

async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='enem-login.html';return;}
  userId=session.user.id;
  const nome=session.user.user_metadata?.full_name||session.user.email.split('@')[0];
  document.getElementById('nav-avatar').textContent=nome.substring(0,2).toUpperCase();
  document.getElementById('nav-user').textContent=nome;
  const{data:p}=await sb.from('enem_perfis').select('*').eq('id',userId).single();
  if(!p||!p.diagnostico_completo){window.location.href='enem-painel.html';return;}
  perfil=p;
  await carregarHoje();
}

async function carregarHoje(){
  const hoje=new Date().toISOString().split('T')[0];
  const{data}=await sb.from('enem_questoes').select('acertou').eq('user_id',userId).gte('created_at',hoje);
  hojeQtd=data?.length||0;hojeAcertos=data?.filter(q=>q.acertou).length||0;
  document.getElementById('badge-hoje').textContent=`${hojeQtd} / ${MAX} hoje`;
  document.getElementById('prog-fill').style.width=Math.min(hojeQtd/MAX*100,100)+'%';
  if(hojeQtd>=MAX)mostrarSessaoConcluida();
}

function selArea(el, area){
  document.querySelectorAll('.area-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  areaSelecionada=area;
}

async function gerarQuestao(){
  if(hojeQtd>=MAX){mostrarSessaoConcluida();return;}
  const disc=document.getElementById('f-disciplina').value;
  const areaLabel=AREA_LABELS[areaSelecionada]||'ENEM';
  const btn=document.getElementById('btn-gerar');
  btn.disabled=true;
  document.getElementById('q-container').innerHTML=`<div class="loading-card"><div class="loading-anim">📚</div><div class="loading-txt">Gerando questão de ${areaLabel}...</div></div>`;
  try{
    const r=await fetch('/api/gerar-questao',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        sistema:'enem',
        banca:'INEP',
        area:areaSelecionada||null,
        disciplina:disc||null,
        nivel_aluno:perfil?.nivel||'intermediario'
      })
    });
    const json=await r.json();
    if(!json.enunciado)throw new Error('Questão inválida');
    // Normaliza opções
    if(json.opcoes&&typeof json.opcoes[0]==='string'){
      json.opcoes=json.opcoes.map((op,i)=>({letra:['A','B','C','D','E'][i],texto:op.replace(/^[A-E]\)\s*/,'')}));
    }
    qAtual=json;
    renderQuestao(qAtual);
  }catch(e){
    document.getElementById('q-container').innerHTML=`<div class="loading-card"><div style="color:var(--red);font-size:.9rem">Erro ao gerar questão. Tente novamente.</div></div>`;
  }
  btn.disabled=false;
}

function renderQuestao(q){
  const letras=['A','B','C','D','E'];
  const cor=AREA_CORES[q.area]||'#a78bfa';
  document.getElementById('q-container').innerHTML=`
    <div class="q-card">
      <div class="q-card-head">
        <span class="q-area-badge" style="background:${cor}20;color:${cor};border-color:${cor}40">${AREA_LABELS[q.area]||q.area||"ENEM"}</span>
        <span class="q-disc-badge">${q.disciplina||''}</span>
        <span style="font-size:.75rem;color:var(--muted);margin-left:auto">${q.assunto||''}</span>
      </div>
      <div class="q-card-body">
        ${q.texto_base ? `<div class="q-text-base">${q.texto_base}</div>` : ''}
        <div class="q-text">${q.enunciado}</div>
        <div class="q-opts">
          ${q.opcoes.map((op,i)=>{
            const letraOp=typeof op==='object'?op.letra:letras[i];
            const textoOp=typeof op==='object'?op.texto:op.replace(/^[A-E]\)\s*/,'');
            return `<button class="q-opt" onclick="responder('${letraOp}')">
              <div class="opt-letter">${letraOp}</div>
              <span>${textoOp}</span>
            </button>`;
          }).join('')}
        </div>
        <div class="q-feedback" id="q-feedback"></div>
        <button class="btn-prox" id="btn-prox" onclick="gerarQuestao()">Próxima questão →</button>
      </div>
    </div>`;
}

async function responder(letra){
  const q=qAtual;if(!q)return;
  document.querySelectorAll('.q-opt').forEach(b=>b.disabled=true);
  const acertou=letra===q.gabarito;
  document.querySelectorAll('.q-opt').forEach(b=>{
    const l=b.querySelector('.opt-letter').textContent;
    if(l===q.gabarito)b.classList.add('correct');
    else if(l===letra&&!acertou)b.classList.add('wrong');
  });
  const fb=document.getElementById('q-feedback');
  fb.className='q-feedback '+(acertou?'acerto':'erro');
  fb.innerHTML=(acertou?'<strong>✓ Correto!</strong> ':'<strong>✗ Incorreto.</strong> ')+(q.explicacao_curta||q.explicacao||'');
    // Mostra explicação didática completa
    if(q.explicacao_didatica){
      const did=document.createElement('div');
      did.className='q-explicacao-didatica';
      did.innerHTML='<div class="q-did-title">📖 Entenda o conteúdo</div>'+q.explicacao_didatica.replace(/\n/g,'<br>');
      fb.appendChild(did);
    }
  fb.style.display='block';
  document.getElementById('btn-prox').style.display='block';
  hojeQtd++;if(acertou)hojeAcertos++;
  document.getElementById('badge-hoje').textContent=`${hojeQtd} / ${MAX} hoje`;
  document.getElementById('prog-fill').style.width=Math.min(hojeQtd/MAX*100,100)+'%';
  await sb.from('enem_questoes').insert({user_id:userId,area:q.area,disciplina:q.disciplina,assunto:q.assunto,enunciado:q.enunciado,gabarito:q.gabarito,acertou});
  if(hojeQtd>=MAX){document.getElementById('btn-prox').textContent='Ver resultado →';document.getElementById('btn-prox').onclick=mostrarSessaoConcluida;}
}

function mostrarSessaoConcluida(){
  const taxa=hojeQtd>0?Math.round(hojeAcertos/hojeQtd*100):0;
  document.getElementById('q-container').innerHTML=`
    <div class="sessao-ok">
      <div style="font-size:3rem;margin-bottom:18px">🎉</div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700;margin-bottom:8px">Sessão concluída!</div>
      <div style="font-size:.9rem;color:var(--muted);margin-bottom:24px">Você completou suas ${MAX} questões de hoje.</div>
      <div class="sessao-stats">
        <div><div class="ss-n">${hojeQtd}</div><div class="ss-l">Respondidas</div></div>
        <div><div class="ss-n" style="color:var(--green)">${hojeAcertos}</div><div class="ss-l">Acertos</div></div>
        <div><div class="ss-n" style="color:var(--purple2)">${taxa}%</div><div class="ss-l">Taxa</div></div>
      </div>
      <button class="btn-mais" onclick="hojeQtd=0;gerarQuestao()">Continuar praticando</button>
    </div>`;
}

async function sair(){await sb.auth.signOut();window.location.href='enem.html';}
init();
</script>
</body>
