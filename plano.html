<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Plano — VOFOR Educação</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0d0b;--bg2:#1c1814;--bg3:#2e2520;--bg4:#080604;
  --gold:#b4afa8;--gold2:#ccc8c2;--gold3:#8a8680;
  --text:#ede8e2;--muted:#8a7d70;--muted2:rgba(200,188,175,0.28);
  --border:rgba(180,175,168,0.15);--border2:rgba(180,175,168,0.35);
  --green:#0fa968;--red:#e05454;--radius:12px;
}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;overflow-x:hidden}

/* ── SIDEBAR ── */
.sidebar{
  width:240px;min-height:100vh;background:var(--bg4);border-right:1px solid var(--border);
  display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;
  transition:width .25s ease,transform .25s ease;z-index:100;
}
.sidebar.collapsed{width:64px}
.sidebar-header{padding:20px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);min-height:68px}
.brand-mark{width:34px;height:34px;background:var(--gold);color:var(--bg4);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:700;font-size:.85rem;flex-shrink:0}
.brand-name{font-family:'Playfair Display',serif;letter-spacing:3px;font-size:.9rem;font-weight:600;line-height:1;display:flex;flex-direction:column;align-items:center;overflow:hidden;transition:opacity .2s,width .2s}
.brand-edu{display:block;font-size:.42rem;letter-spacing:.22em;color:var(--muted);font-weight:500;font-family:'Outfit',sans-serif;text-transform:uppercase;text-align:center;margin-top:2px}
.sidebar.collapsed .brand-name{opacity:0;width:0}
.sidebar-toggle{margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;border-radius:6px;flex-shrink:0;transition:color .2s}
.sidebar-toggle:hover{color:var(--text)}
.sidebar-nav{flex:1;padding:12px 8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 10px;border-radius:10px;color:var(--muted);text-decoration:none;font-size:.875rem;font-weight:500;transition:all .15s;white-space:nowrap;overflow:hidden}
.nav-item:hover{background:var(--muted2);color:var(--text)}
.nav-item.active{background:rgba(180,175,168,0.12);color:var(--gold2)}
.nav-item svg{flex-shrink:0}
.nav-label{overflow:hidden;transition:opacity .2s,width .2s;opacity:1}
.sidebar.collapsed .nav-label{opacity:0;width:0}
.sidebar-footer{padding:12px 8px;border-top:1px solid var(--border)}
.nav-user-pill{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;cursor:pointer;transition:background .15s}
.nav-user-pill:hover{background:var(--muted2)}
.nup-avatar{width:28px;height:28px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:600;color:var(--gold2);flex-shrink:0}
.nup-name{font-size:.8rem;color:var(--muted);overflow:hidden;transition:opacity .2s,width .2s}
.sidebar.collapsed .nup-name{opacity:0;width:0}

/* ── MAIN ── */
.main{flex:1;margin-left:240px;min-height:100vh;transition:margin-left .25s ease;display:flex;flex-direction:column}
.sidebar.collapsed ~ .main{margin-left:64px}

/* ── TOPBAR ── */
.topbar{padding:16px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;background:var(--bg);position:sticky;top:0;z-index:50}
.topbar-title{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:600;color:var(--gold2)}
.topbar-sub{font-size:.8rem;color:var(--muted);margin-left:auto}

/* ── CONTENT ── */
.content{padding:28px;max-width:960px;width:100%;flex:1}

/* ── PLAN HEADER ── */
.plan-header{margin-bottom:28px}
.plan-concurso{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--gold2);font-weight:600;margin-bottom:6px}
.plan-meta{font-size:.85rem;color:var(--muted);display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.plan-meta span{display:flex;align-items:center;gap:5px}
.badge-nivel{padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.badge-nivel.iniciante{background:rgba(15,169,104,.12);color:var(--green)}
.badge-nivel.intermediario{background:rgba(180,175,168,.1);color:var(--gold)}
.badge-nivel.avancado{background:rgba(224,84,84,.1);color:var(--red)}

/* ── PROGRESS CARD ── */
.progress-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin-bottom:24px;display:flex;align-items:center;gap:20px}
.progress-ring-wrap{position:relative;flex-shrink:0}
.progress-ring-wrap svg{transform:rotate(-90deg)}
.progress-ring-bg{fill:none;stroke:var(--border2);stroke-width:5}
.progress-ring-fill{fill:none;stroke:var(--green);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset .6s ease}
.progress-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:600;color:var(--green);font-family:'Playfair Display',serif}
.progress-info{flex:1}
.progress-title{font-size:1rem;font-weight:600;color:var(--text);margin-bottom:4px}
.progress-desc{font-size:.82rem;color:var(--muted)}
.progress-counts{display:flex;gap:20px;margin-top:10px}
.progress-counts span{font-size:.82rem;color:var(--muted)}
.progress-counts strong{color:var(--text)}
.sync-badge{font-size:.72rem;padding:3px 10px;border-radius:20px;background:rgba(15,169,104,.1);color:var(--green);border:1px solid rgba(15,169,104,.2)}
.sync-badge.syncing{background:rgba(180,175,168,.08);color:var(--muted);border-color:var(--border)}

/* ── WEEK TABS ── */
.week-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.week-tab{padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.82rem;font-family:'Outfit',sans-serif;cursor:pointer;transition:all .15s;font-weight:500}
.week-tab:hover{border-color:var(--border2);color:var(--text)}
.week-tab.active{background:var(--gold);color:var(--bg4);border-color:var(--gold);font-weight:600}

/* ── DISCIPLINE SECTION ── */
.disc-section{margin-bottom:20px}
.disc-header{display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;cursor:pointer;user-select:none;transition:background .15s}
.disc-header:hover{background:var(--bg3)}
.disc-icon{width:8px;height:8px;border-radius:50%;background:var(--gold3);flex-shrink:0}
.disc-name{font-weight:600;font-size:.92rem;flex:1}
.disc-progress-mini{font-size:.78rem;color:var(--muted)}
.disc-chevron{color:var(--muted);transition:transform .25s}
.disc-chevron.open{transform:rotate(180deg)}
.disc-body{border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);overflow:hidden;display:none}
.disc-body.open{display:block}

/* ── TASK ITEM ── */
.task-item{display:flex;align-items:flex-start;gap:14px;padding:14px 18px;border-bottom:1px solid var(--border);transition:background .12s}
.task-item:last-child{border-bottom:none}
.task-item:hover{background:rgba(180,175,168,.03)}
.task-item.done{opacity:.55}
.task-cb{position:relative;flex-shrink:0;margin-top:1px}
.task-cb input{position:absolute;opacity:0;width:0;height:0}
.task-cb label{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;background:transparent}
.task-cb input:checked + label{background:var(--green);border-color:var(--green)}
.task-cb input:checked + label::after{content:'';width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg);margin-top:-2px}
.task-body{flex:1}
.task-assunto{font-size:.88rem;font-weight:500;color:var(--text);margin-bottom:3px}
.task-tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{padding:2px 8px;border-radius:4px;font-size:.7rem;background:var(--muted2);color:var(--muted)}
.tag.alta{background:rgba(224,84,84,.1);color:var(--red)}
.tag.media{background:rgba(180,175,168,.1);color:var(--gold)}
.tag.baixa{background:rgba(15,169,104,.08);color:var(--green)}
.task-meta-right{text-align:right;flex-shrink:0}
.task-questoes{font-size:.78rem;color:var(--muted);white-space:nowrap}

/* ── GENERATE BUTTON ── */
.gen-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center}
.gen-icon{font-size:3rem;margin-bottom:16px;opacity:.4}
.gen-title{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--gold2);margin-bottom:8px}
.gen-desc{font-size:.88rem;color:var(--muted);margin-bottom:28px;max-width:380px;line-height:1.6}
.btn-gen{padding:14px 32px;background:var(--gold);color:var(--bg4);border:none;border-radius:10px;font-family:'Outfit',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px}
.btn-gen:hover{background:var(--gold2);transform:translateY(-1px)}
.btn-gen:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-gen .spinner{width:16px;height:16px;border:2px solid rgba(0,0,0,.2);border-top-color:var(--bg4);border-radius:50%;animation:spin .7s linear infinite;display:none}
.btn-gen.loading .spinner{display:block}
.btn-gen.loading .btn-label{opacity:.6}

/* ── REGEN BUTTON ── */
.btn-regen{padding:8px 16px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:8px;font-family:'Outfit',sans-serif;font-size:.8rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.btn-regen:hover{border-color:var(--border2);color:var(--text)}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 18px;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;font-size:.85rem;color:var(--text);z-index:999;transform:translateY(60px);opacity:0;transition:all .3s;display:flex;align-items:center;gap:8px}
.toast.show{transform:translateY(0);opacity:1}
.toast.success .toast-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.toast.error .toast-dot{background:var(--red)}

/* ── LOADING SKELETON ── */
.skeleton{background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.mobile-open{transform:translateX(0)}
  .main{margin-left:0!important}
  .content{padding:16px}
  .progress-card{flex-direction:column;text-align:center}
  .topbar{padding:14px 16px}
  .mobile-menu-btn{display:flex!important}
}
.mobile-menu-btn{display:none;background:none;border:none;color:var(--text);cursor:pointer;padding:4px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;display:none}
.overlay.show{display:block}
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="brand-mark">VF</div>

    <button class="sidebar-toggle" id="sidebar-toggle" title="Recolher menu">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>

</aside>
<div class="overlay" id="overlay"></div>

<!-- Main -->
<div class="main">
  <header class="topbar">
    <button class="mobile-menu-btn" id="mobile-menu-btn">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <span class="topbar-title">Meu Plano de Estudos</span>
    <div style="display:flex;align-items:center;gap:10px;margin-left:auto">
      <span class="sync-badge syncing" id="sync-status">—</span>
      <button class="btn-regen" id="btn-regen" style="display:none" onclick="regenerarPlano()">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Gerar novo plano
      </button>
    </div>
  </header>

  <div class="content" id="content">
    <!-- Carregando... -->
    <div id="loading-state" style="padding:60px 0;text-align:center">
      <div class="skeleton" style="height:24px;width:200px;margin:0 auto 12px"></div>
      <div class="skeleton" style="height:16px;width:140px;margin:0 auto"></div>
    </div>
    <div id="plan-container" style="display:none"></div>
    <div id="empty-state" style="display:none"></div>
  </div>

<div class="toast" id="toast"><div class="toast-dot"></div><span id="toast-msg"></span></div>

<script>
const SB_URL = 'https://lklmzhunhiwqsbhnymaw.supabase.co';
const SB_KEY = 'sb_publishable_DvhwDRaB-L4kO9gOYXgtxw_0jVdsuHU';
// Chave Groq removida do frontend — agora fica em variável de ambiente no Vercel
const sb = supabase.createClient(SB_URL, SB_KEY);

let currentUser = null;
let userPerfil = null;
let planoData = [];  // [{semana, disciplina, assunto, meta_questoes, prioridade, concluido, id(supabase)}]
let semanaAtiva = 1;
let totalSemanas = 4;

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }
  currentUser = session.user;

  // Avatar / nome
  const nome = currentUser.user_metadata?.nome || currentUser.email.split('@')[0];
  const iniciais = nome.split(' ').map(n => n[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('nav-avatar').textContent = iniciais;
  document.getElementById('nav-user').textContent = nome;

  // Sidebar state
  const collapsed = localStorage.getItem('vofor_sb_collapsed') === 'true';
  if (collapsed) document.getElementById('sidebar').classList.add('collapsed');

  await carregarPerfil();
  await carregarPlano();
}

async function carregarPerfil() {
  const { data } = await sb.from('perfis').select('*').eq('id', currentUser.id).single();
  userPerfil = data;
}

// ── CARREGAR PLANO ────────────────────────────────────────────────────────────
async function carregarPlano() {
  setSyncStatus('Carregando…', false);

  // 1. Tenta Supabase
  const { data: sbData, error } = await sb
    .from('planos_estudo')
    .select('*')
    .eq('user_id', currentUser.id)
    .order('semana')
    .order('prioridade');

  if (!error && sbData && sbData.length > 0) {
    planoData = sbData;
    setSyncStatus('Sincronizado', true);
    renderPlano();
    return;
  }

  // 2. Fallback localStorage
  const lsKey = `vofor_plano_${currentUser.id}`;
  const ls = localStorage.getItem(lsKey);
  if (ls) {
    try {
      const parsed = JSON.parse(ls);
      planoData = parsed;
      // Migra pro Supabase silenciosamente
      await salvarPlanoSupabase(parsed, true);
      setSyncStatus('Sincronizado', true);
      renderPlano();
      return;
    } catch(e) {}
  }

  // 3. Sem plano
  document.getElementById('loading-state').style.display = 'none';
  document.getElementById('empty-state').style.display = 'block';
  renderEmpty();
}

// ── RENDER PLANO ──────────────────────────────────────────────────────────────
function renderPlano() {
  document.getElementById('loading-state').style.display = 'none';
  document.getElementById('empty-state').style.display = 'none';
  const container = document.getElementById('plan-container');
  container.style.display = 'block';
  document.getElementById('btn-regen').style.display = 'flex';

  totalSemanas = Math.max(...planoData.map(i => i.semana), 1);

  // Stats
  const total = planoData.length;
  const done  = planoData.filter(i => i.concluido).length;
  const pct   = total > 0 ? Math.round((done/total)*100) : 0;
  const concurso = planoData[0]?.concurso || (userPerfil?.concurso || 'Seu Concurso');
  const nivel = userPerfil?.nivel || 'intermediario';

  const circumference = 2 * Math.PI * 28;
  const dash = circumference - (pct/100) * circumference;

  container.innerHTML = `
    <div class="plan-header">
      <div class="plan-concurso">${concurso}</div>
      <div class="plan-meta">
        <span class="badge-nivel ${nivel}">${nivel}</span>
        <span>
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          ${totalSemanas} semanas
        </span>
        <span>
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          ${total} tópicos
        </span>
      </div>
    </div>

    <div class="progress-card">
      <div class="progress-ring-wrap">
        <svg width="70" height="70" viewBox="0 0 70 70">
          <circle class="progress-ring-bg" cx="35" cy="35" r="28"/>
          <circle class="progress-ring-fill" cx="35" cy="35" r="28"
            stroke-dasharray="${circumference}"
            stroke-dashoffset="${dash}"/>
        </svg>
        <div class="progress-pct">${pct}%</div>
      </div>
      <div class="progress-info">
        <div class="progress-title">Progresso geral do plano</div>
        <div class="progress-desc">Marque os tópicos conforme você estuda — o progresso é salvo automaticamente.</div>
        <div class="progress-counts">
          <span><strong>${done}</strong> concluídos</span>
          <span><strong>${total - done}</strong> pendentes</span>
          <span><strong>${total}</strong> total</span>
        </div>
      </div>
    </div>

    <div class="week-tabs" id="week-tabs"></div>
    <div id="week-content"></div>
  `;

  renderWeekTabs();
  renderWeekContent();
}

function renderWeekTabs() {
  const tabs = document.getElementById('week-tabs');
  tabs.innerHTML = '';
  for (let s = 1; s <= totalSemanas; s++) {
    const items = planoData.filter(i => i.semana === s);
    const done  = items.filter(i => i.concluido).length;
    const btn = document.createElement('button');
    btn.className = 'week-tab' + (s === semanaAtiva ? ' active' : '');
    btn.textContent = `Semana ${s}${items.length > 0 ? ` (${done}/${items.length})` : ''}`;
    btn.onclick = () => { semanaAtiva = s; renderWeekTabs(); renderWeekContent(); };
    tabs.appendChild(btn);
  }
}

function renderWeekContent() {
  const wc = document.getElementById('week-content');
  const items = planoData.filter(i => i.semana === semanaAtiva);

  if (!items.length) { wc.innerHTML = '<p style="color:var(--muted);font-size:.85rem;padding:20px 0">Sem itens nesta semana.</p>'; return; }

  // Agrupar por disciplina
  const byDisc = {};
  items.forEach(it => {
    if (!byDisc[it.disciplina]) byDisc[it.disciplina] = [];
    byDisc[it.disciplina].push(it);
  });

  wc.innerHTML = Object.entries(byDisc).map(([disc, tasks]) => {
    const discDone = tasks.filter(t => t.concluido).length;
    return `
      <div class="disc-section">
        <div class="disc-header" onclick="toggleDisc(this)">
          <div class="disc-icon"></div>
          <div class="disc-name">${disc}</div>
          <div class="disc-progress-mini">${discDone}/${tasks.length}</div>
          <svg class="disc-chevron open" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="disc-body open">
          ${tasks.map(t => renderTask(t)).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function renderTask(t) {
  const priorClasse = (t.prioridade === 'alta' || t.prioridade === 1) ? 'alta' : (t.prioridade === 'media' || t.prioridade === 2) ? 'media' : 'baixa';
  const priorLabel  = (t.prioridade === 'alta' || t.prioridade === 1) ? 'Alta prioridade' : (t.prioridade === 'media' || t.prioridade === 2) ? 'Média' : 'Baixa';
  const cbId = `cb_${t.id || t.assunto.replace(/\s/g,'_')}`;
  return `
    <div class="task-item${t.concluido ? ' done' : ''}" id="task_${t.id || t.assunto.replace(/\s/g,'_')}">
      <div class="task-cb">
        <input type="checkbox" id="${cbId}" ${t.concluido ? 'checked' : ''} onchange="toggleTask('${t.id}', this.checked)">
        <label for="${cbId}"></label>
      </div>
      <div class="task-body">
        <div class="task-assunto">${t.assunto}</div>
        <div class="task-tags">
          <span class="tag ${priorClasse}">${priorLabel}</span>
          ${t.banca ? `<span class="tag">${t.banca}</span>` : ''}
        </div>
      </div>
      <div class="task-meta-right">
        <div class="task-questoes">${t.meta_questoes || 10} questões</div>
      </div>
    </div>
  `;
}

// ── TOGGLE TASK ───────────────────────────────────────────────────────────────
async function toggleTask(id, checked) {
  // Atualiza local
  const item = planoData.find(i => i.id == id);
  if (item) item.concluido = checked;

  // Sync Supabase
  setSyncStatus('Salvando…', false);
  const { error } = await sb
    .from('planos_estudo')
    .update({ concluido: checked })
    .eq('id', id)
    .eq('user_id', currentUser.id);

  if (error) {
    showToast('Erro ao salvar — tente novamente', 'error');
    setSyncStatus('Erro de sync', false);
    return;
  }

  setSyncStatus('Sincronizado', true);
  // Atualiza visual sem re-render completo
  renderWeekTabs();
  atualizarProgressCard();
}

function atualizarProgressCard() {
  const total = planoData.length;
  const done  = planoData.filter(i => i.concluido).length;
  const pct   = total > 0 ? Math.round((done/total)*100) : 0;
  const circumference = 2 * Math.PI * 28;
  const dash = circumference - (pct/100) * circumference;

  const fillEl = document.querySelector('.progress-ring-fill');
  const pctEl  = document.querySelector('.progress-pct');
  const c1 = document.querySelectorAll('.progress-counts strong');
  if (fillEl) fillEl.style.strokeDashoffset = dash;
  if (pctEl)  pctEl.textContent = pct + '%';
  if (c1[0]) c1[0].textContent = done;
  if (c1[1]) c1[1].textContent = total - done;
}

// ── TOGGLE DISC ───────────────────────────────────────────────────────────────
function toggleDisc(header) {
  const body = header.nextElementSibling;
  const chevron = header.querySelector('.disc-chevron');
  body.classList.toggle('open');
  chevron.classList.toggle('open');
}

// ── EMPTY STATE ───────────────────────────────────────────────────────────────
function renderEmpty() {
  document.getElementById('empty-state').innerHTML = `
    <div class="gen-wrap">
      <div class="gen-icon">📋</div>
      <div class="gen-title">Nenhum plano encontrado</div>
      <div class="gen-desc">Gere um plano de estudos personalizado com IA, baseado no seu perfil, nível e tempo disponível.</div>
      <button class="btn-gen" id="btn-gen-main" onclick="gerarPlano()">
        <div class="spinner"></div>
        <span class="btn-label">✦ Gerar meu plano com IA</span>
      </button>
    </div>
  `;
}

// ── GERAR PLANO ───────────────────────────────────────────────────────────────
async function gerarPlano() {
  const btn = document.getElementById('btn-gen-main');
  if (btn) { btn.classList.add('loading'); btn.disabled = true; }
  setSyncStatus('Gerando plano…', false);

  try {
    const perfil = userPerfil || {};
    const prompt = `Você é um especialista em concursos públicos brasileiros.
Crie um plano de estudos estruturado para um candidato com o seguinte perfil:
- Concurso/cargo: ${perfil.concurso || 'Concurso Público Geral'}
- Área: ${perfil.area || 'Administrativa'}
- Nível: ${perfil.nivel || 'intermediario'}
- Horas por dia disponíveis: ${perfil.horas_dia || 2}h
- Estado: ${perfil.estado || 'SP'}

Retorne SOMENTE um JSON válido (sem markdown, sem texto extra) com este formato exato:
{
  "concurso": "Nome do concurso",
  "semanas": 4,
  "itens": [
    {
      "semana": 1,
      "disciplina": "Português",
      "assunto": "Interpretação de Texto",
      "meta_questoes": 15,
      "prioridade": "alta",
      "banca": "CESPE"
    }
  ]
}

Gere no mínimo 20 itens distribuídos nas semanas. Prioridade deve ser "alta", "media" ou "baixa".`;

    const resp = await fetch('/api/groq', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [{ role: 'user', content: prompt }],
        max_tokens: 1500,
        temperature: 0.4
      })
    });

    const json = await resp.json();
    let texto = json.choices?.[0]?.message?.content || '';
    // Strip markdown fences
    texto = texto.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(texto);

    if (!parsed.itens || !Array.isArray(parsed.itens)) throw new Error('JSON inválido');

    // Salva no Supabase
    await salvarPlanoSupabase(parsed.itens.map(i => ({...i, concurso: parsed.concurso || perfil.concurso})));

    showToast('Plano gerado e salvo!', 'success');

  } catch(e) {
    console.error(e);
    showToast('Erro ao gerar plano — tente novamente', 'error');
    setSyncStatus('Erro', false);
    if (btn) { btn.classList.remove('loading'); btn.disabled = false; }
  }
}

async function regenerarPlano() {
  // Deleta plano atual do Supabase
  await sb.from('planos_estudo').delete().eq('user_id', currentUser.id);
  planoData = [];
  document.getElementById('plan-container').style.display = 'none';
  document.getElementById('btn-regen').style.display = 'none';
  document.getElementById('empty-state').style.display = 'block';
  renderEmpty();
  // Auto-inicia geração
  await gerarPlano();
}

// ── SALVAR SUPABASE ───────────────────────────────────────────────────────────
async function salvarPlanoSupabase(itens, isMigration = false) {
  if (!isMigration) {
    // Limpa plano anterior
    await sb.from('planos_estudo').delete().eq('user_id', currentUser.id);
  }

  const rows = itens.map(it => ({
    user_id: currentUser.id,
    concurso: it.concurso || userPerfil?.concurso || '',
    semana: it.semana,
    disciplina: it.disciplina,
    assunto: it.assunto,
    meta_questoes: it.meta_questoes || 10,
    prioridade: it.prioridade || 'media',
    concluido: it.concluido || false,
    created_at: new Date().toISOString()
  }));

  const { data, error } = await sb.from('planos_estudo').insert(rows).select();
  if (error) { console.error('Erro ao salvar plano:', error); return; }

  planoData = data;
  // Limpa localStorage (migração concluída)
  localStorage.removeItem(`vofor_plano_${currentUser.id}`);
  renderPlano();
}

// ── UI HELPERS ────────────────────────────────────────────────────────────────
function setSyncStatus(msg, ok) {
  const el = document.getElementById('sync-status');
  el.textContent = msg;
  el.className = 'sync-badge' + (ok ? '' : ' syncing');
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
document.getElementById('sidebar-toggle').addEventListener('click', () => {
  const sb_ = document.getElementById('sidebar');
  sb_.classList.toggle('collapsed');
  localStorage.setItem('vofor_sb_collapsed', sb_.classList.contains('collapsed'));
});
document.getElementById('mobile-menu-btn')?.addEventListener('click', () => {
  document.getElementById('sidebar').classList.add('mobile-open');
  document.getElementById('overlay').classList.add('show');
});
document.getElementById('overlay').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('overlay').classList.remove('show');
});

init();
</script>
</body>
